name: 02 - Terraform Plan & Apply

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: '리소스 그룹 이름'
        required: true
        default: 'AZ-WORKING-RG'
        type: string
      location:
        description: 'Azure 리전'
        required: true
        default: 'koreacentral'
        type: string
      vnet_name:
        description: 'VNet 이름'
        required: true
        default: 'vnet-oidc-test'
        type: string
      action:
        description: '실행 작업 선택'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

# ============================================================
# OIDC 인증을 위한 필수 권한
# - id-token: write -> GitHub OIDC Provider로부터 JWT 토큰 발급
# - contents: read  -> 리포지토리 코드 체크아웃
# ============================================================
permissions:
  id-token: write
  contents: read

# ============================================================
# 환경 변수 설정
# GitHub Secrets에서 Azure User Managed Identity 정보 참조
# ============================================================
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true          # Terraform AzureRM Provider OIDC 인증 활성화
  TF_VERSION: '1.7.0'
  TF_WORKING_DIR: terraform

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment:
      name: production
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      # ============================================================
      # 1. 소스 코드 체크아웃
      # ============================================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # 2. Azure OIDC 로그인 (User Managed Identity)
      #
      # 인증 흐름:
      # 1. GitHub Actions -> GitHub OIDC Provider -> OIDC JWT Token 발급
      # 2. OIDC JWT Token -> Azure AD Federated Identity 검증
      # 3. Azure AD -> Access Token 발급
      # 4. Access Token을 사용하여 Azure 리소스 접근
      # ============================================================
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ============================================================
      # 3. Terraform Setup
      # ============================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ============================================================
      # 4. OIDC 환경변수 설정 (Terraform AzureRM Provider용)
      # ============================================================
      - name: Set OIDC env vars for Terraform
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      # ============================================================
      # 5. Terraform Init
      # ============================================================
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "============================================"
          echo "Terraform Init 시작"
          echo "============================================"
          echo "  ARM_CLIENT_ID       : ${ARM_CLIENT_ID:0:8}..."
          echo "  ARM_TENANT_ID       : ${ARM_TENANT_ID:0:8}..."
          echo "  ARM_SUBSCRIPTION_ID : ${ARM_SUBSCRIPTION_ID:0:8}..."
          echo "  ARM_USE_OIDC        : true"
          echo ""
          terraform init

      # ============================================================
      # 6. Terraform Validate
      # ============================================================
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # ============================================================
      # 7. Terraform Plan
      # ============================================================
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "============================================"
          echo "Terraform Plan 시작"
          echo "============================================"
          echo ""
          echo "입력 변수:"
          echo "  Resource Group : ${{ inputs.resource_group_name }}"
          echo "  Location       : ${{ inputs.location }}"
          echo "  VNet Name      : ${{ inputs.vnet_name }}"
          echo "  Action         : ${{ inputs.action }}"
          echo ""

          PLAN_FLAGS="-var=resource_group_name=${{ inputs.resource_group_name }} \
            -var=location=${{ inputs.location }} \
            -var=vnet_name=${{ inputs.vnet_name }} \
            -out=tfplan \
            -input=false"

          if [ "${{ inputs.action }}" == "destroy" ]; then
            terraform plan $PLAN_FLAGS -destroy
            EXIT_CODE=$?
          else
            terraform plan $PLAN_FLAGS -detailed-exitcode
            EXIT_CODE=$?
          fi

          # exit code 의미:
          #   0 = 변경사항 없음 (성공)
          #   1 = 오류 (실패)
          #   2 = 변경사항 있음 (성공 - apply 대상)
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 1 ]; then
            echo "Terraform Plan 실패 (exit code 1)"
            exit 1
          fi
          exit 0

      # ============================================================
      # 8. Plan 결과 요약 출력
      # ============================================================
      - name: Terraform Plan Result
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "============================================"
          echo "Plan 결과: ${{ steps.plan.outcome }}"
          echo "Exit Code: ${{ steps.plan.outputs.exit_code }} (0=변경없음, 2=변경있음)"
          echo "============================================"
          if [ -f tfplan ]; then
            terraform show -no-color tfplan
          else
            echo "tfplan 파일이 없습니다. Plan 단계가 실패했을 수 있습니다."
            exit 1
          fi

      # ============================================================
      # 9. Plan 결과 artifact 저장
      # ============================================================
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment:
      name: production
    if: ${{ inputs.action == 'apply' || inputs.action == 'destroy' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set OIDC env vars for Terraform
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # ============================================================
      # Plan artifact 다운로드 후 Apply
      # ============================================================
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "============================================"
          echo "Terraform ${{ inputs.action }} 시작"
          echo "============================================"
          terraform apply -input=false -auto-approve tfplan

      - name: Terraform Outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output
